# npm 게시 워크플로우 (@peoplenexteam/toodoori-mcp)
#
# 트리거:
#   1. v* 태그 push (예: v0.1.0) → 릴리스 게시
#   2. 수동 실행(workflow_dispatch) → Actions 탭 "Run workflow"
#
# 인증: npm Trusted Publishing(OIDC) — 토큰 없이 게시(NPM_TOKEN 불필요).
#   - npm 패키지 설정에서 trusted publisher 등록 필요:
#       owner=peoplenex, repo=toodoori-mcp, workflow=publish.yml, environment=(비움)
#   - permissions.id-token: write 로 OIDC 토큰을 발급 → npm이 자동 인증.
#
# provenance: public 레포 + OIDC라 자동 출처 증명.
#   - package.json repository.url 이 이 레포와 일치해야 함
#   - OIDC 게시는 npm CLI >= 11.5.1 필요 → 아래 "Ensure npm" 스텝에서 최신화

name: Publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# 동시 게시 방지
concurrency:
  group: publish
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write # npm provenance(OIDC)

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 주의: registry-url을 주면 setup-node가 .npmrc에 더미 authToken(XXXXX-...)을
      # 박아 OIDC 신뢰 게시를 가로채 404가 난다. 기본 레지스트리가 npmjs라 생략한다.
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'yarn'

      - name: Ensure npm supports OIDC (>= 11.5.1)
        run: npm install -g npm@latest

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Type check
        run: yarn typecheck

      - name: Build
        run: yarn build

      # 동일 version이 이미 npm에 있으면 게시를 건너뛴다(재실행/중복 방지).
      - name: Check published version
        id: check
        run: |
          NAME=$(node -p "require('./package.json').name")
          VERSION=$(node -p "require('./package.json').version")
          echo "대상: $NAME@$VERSION"
          if npm view "$NAME@$VERSION" version >/dev/null 2>&1; then
            echo "::notice::$NAME@$VERSION 는 이미 게시됨 — 건너뜁니다. 새로 게시하려면 package.json의 version을 올리세요."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish
        if: steps.check.outputs.skip == 'false'
        run: npm publish --provenance --access public
